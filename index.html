<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>강아지 몰래 쏘이갈릭킹!</title>
<style>
    @font-face { font-family: 'BMKkubulimTTF'; src: url('BMKkubulimTTF.ttf') format('truetype'); }
    
    body { margin: 0; padding: 0; background: #000; font-family: 'Arial', sans-serif; text-align: center; overflow: hidden; touch-action: manipulation; display: flex; justify-content: center; align-items: center; height: 100vh; }
    
    #game { position: relative; width: 100vw; height: 100vh; max-width: 500px; max-height: 100vh; overflow: hidden; background-color: #000; background-image: url('배경2.png'); background-size: contain; background-repeat: no-repeat; background-position: center; }

    #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; background-image: url('첫 장면.png'); background-size: contain; background-repeat: no-repeat; background-position: center; z-index: 500; display: flex; justify-content: center; align-items: center; flex-direction: column; }

    #particle-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 501; pointer-events: none; }
    .particle { position: absolute; border-radius: 50%; background: #ffffff; box-shadow: 0 0 15px 5px rgba(255, 255, 255, 0.75); animation: twinkleFade 0.6s infinite steps(2); opacity: 0; pointer-events: none; }
    @keyframes twinkleFade { 0% { opacity: 0; transform: scale(0.4); } 100% { opacity: 1; transform: scale(1.1); } }

    #waving-hand { position: absolute; bottom: 5%; right: -15%; width: 75%; height: auto; z-index: 505; pointer-events: none; animation: wavingHand 0.6s infinite steps(2); transform-origin: bottom right; }
    @keyframes wavingHand { 0% { transform: rotate(-10deg); } 100% { transform: rotate(10deg); } }

    .ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 18px; font-weight: bold; color: #5d4037; z-index: 100; background: rgba(255, 255, 255, 0.85); padding: 5px 15px; border-radius: 20px; white-space: nowrap; }

    /* 🐶 강아지 크기 1.5배 확대 */
    .dog-container { 
        position: absolute; top: 10%; left: 50%; transform: translateX(-50%); 
        width: 140%; 
        pointer-events: none; z-index: 10; 
    }
    #dog-img { width: 100%; height: auto; display: block; }

    .item { position: absolute; width: 100px; height: auto; cursor: pointer; z-index: 50; transition: transform 0.1s; }
    .item.selected { filter: drop-shadow(0 0 15px #ff5722) brightness(1.1); animation: shake 0.5s infinite; }
    @keyframes shake { 0%, 100% { transform: scale(1.1) rotate(0deg); } 25% { transform: scale(1.1) rotate(3deg); } 75% { transform: scale(1.1) rotate(-3deg); } }

    /* 🏆 결과 화면 레이아웃 (위로 끌어올림) */
    #result-screen { 
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        background-color: #000; 
        background-image: url('점수.png'); 
        background-size: contain; 
        background-repeat: no-repeat; 
        background-position: center; 
        display: none; 
        flex-direction: column; 
        justify-content: flex-start; 
        align-items: center; 
        z-index: 300; 
        color: white; 
        font-family: 'BMKkubulimTTF', sans-serif; 
        padding-top: 22vh; /* 더 위로 올렸습니다 */
    }

    .result-text-area { margin-bottom: 25px; }

    .btn-action { 
        padding: 12px 35px; background: #ff4081; color: white; border-radius: 50px; border: none; font-size: 20px; font-family: 'BMKkubulimTTF', sans-serif; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 502; 
    }
</style>
</head>
<body>

<div id="game">
    <div id="start-screen">
        <div id="particle-container"></div>
        <button id="start-btn" class="btn-action">게임 시작하기</button>
        <img id="waving-hand" src="손까딱.png" alt="✋">
    </div>

    <div class="ui">점수: <span id="score">0</span> / 100</div>
    <div class="dog-container">
        <img id="dog-img" src="뒷모습 강아지.png" alt="강아지">
    </div>
    <img id="chicken" class="item" src="치킨.png" alt="치킨" style="display: none;">
    <img id="sauce" class="item" src="갈릭 소스.png" alt="갈릭 소스" style="display: none;">

    <div id="ending-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; justify-content: center; align-items: center; z-index: 200;">
        <img id="full-ending-img" src="" alt="ending" style="width: 100%; height: 100%; object-fit: contain;">
    </div>
    
    <div id="result-screen">
        <div class="result-text-area">
            <div style="font-size: 28px; text-shadow: 2px 2px 5px #000; margin-bottom: 8px; line-height: 1.2;">손 쉴 틈 없이 먹은<br>치킨 조각</div>
            <div style="font-size: 52px; color: #ffcc00; text-shadow: 3px 3px 8px #000;"><span id="last-score">0</span>개</div>
        </div>
        <button onclick="location.reload()" class="btn-action">다시 시작하기</button>
    </div>
</div>

<script>
    // 🔊 사운드 객체 로드
    const sounds = {
        bgmPlay: new Audio('https://assets.mixkit.co/music/preview/mixkit-comical-stealth-703.mp3'),
        clickChicken: new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3'),
        clickSauce: new Audio('https://www.soundjay.com/buttons/sounds/button-15.mp3'),
        dogBark: new Audio('https://www.soundjay.com/nature/sounds/dog-bark-1.mp3'),
        scoreResult: new Audio('https://www.soundjay.com/misc/sounds/magic-chime-01.mp3')
    };

    // 설정
    sounds.bgmPlay.loop = true;
    sounds.bgmPlay.volume = 0.4;

    let score = 0; let isLooking = false; let gameOver = true;
    const startScreen = document.getElementById("start-screen");

    // 🚀 [게임 시작하기]를 누르는 순간 모든 사운드가 해제됩니다!
    document.getElementById("start-btn").addEventListener("click", () => {
        // 첫 클릭과 동시에 사운드 시작!
        sounds.bgmPlay.play().catch(e => console.log("사운드 재생 실패:", e));
        
        startScreen.style.display = "none"; 
        clearInterval(pInterval);
        gameOver = false; 
        relocateItems();
        randomTurn();
    });

    // --- 나머지 로직 ---
    const particleContainer = document.getElementById("particle-container");
    function createParticles() {
        if (!gameOver) return;
        for(let i=0; i<60; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            const size = Math.random() * 8 + 3; 
            p.style.width = `${size}px`; p.style.height = `${size}px`;
            p.style.top = `${Math.random() * 100}%`; p.style.left = `${Math.random() * 100}%`;
            particleContainer.appendChild(p);
            setTimeout(() => { if(p.parentNode) p.remove(); }, 600);
        }
    }
    let pInterval = setInterval(createParticles, 600);

    const scoreEl = document.getElementById("score");
    const dogImg = document.getElementById("dog-img");
    const chicken = document.getElementById("chicken");
    const sauce = document.getElementById("sauce");
    const resultScreen = document.getElementById("result-screen");
    const lastScoreEl = document.getElementById("last-score");
    let state = "idle";

    function relocateItems() {
        if (gameOver) return;
        const rect = document.getElementById("game").getBoundingClientRect();
        chicken.style.left = `${Math.random() * (rect.width - 110) + 5}px`;
        chicken.style.top = `${Math.random() * (rect.height * 0.2) + (rect.height * 0.7)}px`;
        sauce.style.left = `${Math.random() * (rect.width - 110) + 5}px`;
        sauce.style.top = `${Math.random() * (rect.height * 0.2) + (rect.height * 0.7)}px`;
        chicken.style.display = "block"; sauce.style.display = "block";
        chicken.classList.remove("selected");
        state = "idle";
    }

    function randomTurn() {
        if (gameOver) return;
        setTimeout(() => {
            if (gameOver) return;
            isLooking = true;
            dogImg.src = "뒤돌아 보는 강아지.png"; 
            setTimeout(() => {
                if (gameOver) return;
                isLooking = false;
                dogImg.src = "뒷모습 강아지.png"; 
                randomTurn();
            }, 800);
        }, Math.random() * 2000 + 1000);
    }

    function handleStart(e) {
        e.preventDefault();
        if (gameOver) return;
        if (isLooking) return endGame();
        const target = e.target;
        if (target === chicken && state === "idle") {
            state = "picked";
            chicken.classList.add("selected");
            sounds.clickChicken.currentTime = 0;
            sounds.clickChicken.play();
        } else if (target === sauce && state === "picked") {
            score++;
            scoreEl.innerText = score;
            sounds.clickSauce.currentTime = 0;
            sounds.clickSauce.play();
            relocateItems();
        }
    }

    chicken.addEventListener("mousedown", handleStart);
    sauce.addEventListener("mousedown", handleStart);
    chicken.addEventListener("touchstart", handleStart);
    sauce.addEventListener("touchstart", handleStart);

    function endGame() {
        gameOver = true;
        sounds.bgmPlay.pause();
        sounds.dogBark.play();
        document.getElementById("ending-overlay").style.display = "flex";
        document.getElementById("full-ending-img").src = "ending1.png"; 
        setTimeout(() => {
            document.getElementById("full-ending-img").src = "ending2.png"; 
            setTimeout(() => {
                document.getElementById("ending-overlay").style.display = "none";
                resultScreen.style.display = "flex";
                lastScoreEl.innerText = score;
                sounds.scoreResult.play();
            }, 1200);
        }, 800);
    }
</script>
</body>
</html>
