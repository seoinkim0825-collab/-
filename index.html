<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>강아지 몰래 쏘이갈릭킹!</title>
<style>
    @font-face { font-family: 'BMKkubulimTTF'; src: url('BMKkubulimTTF.ttf') format('truetype'); }
    
    body { margin: 0; padding: 0; background: #000; font-family: 'Arial', sans-serif; text-align: center; overflow: hidden; touch-action: manipulation; display: flex; justify-content: center; align-items: center; height: 100vh; }
    
    #game { position: relative; width: 100vw; height: 100vh; max-width: 500px; max-height: 100vh; overflow: hidden; background-color: #000; background-image: url('배경2.png'); background-size: cover; background-repeat: no-repeat; background-position: center; }

    #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; background-image: url('첫 장면.png'); background-size: 100% 100%; background-repeat: no-repeat; background-position: center; z-index: 500; display: flex; justify-content: center; align-items: center; flex-direction: column; }

    #particle-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 501; pointer-events: none; }
    .particle { position: absolute; border-radius: 50%; background: #ffffff; box-shadow: 0 0 15px 5px rgba(255, 255, 255, 0.75); animation: twinkleFade 0.6s infinite steps(2); opacity: 0; pointer-events: none; }
    @keyframes twinkleFade { 0% { opacity: 0; transform: scale(0.4); } 100% { opacity: 1; transform: scale(1.1); } }

    #waving-hand { position: absolute; top: 58%; right: -10%; width: 70%; height: auto; z-index: 505; pointer-events: none; animation: wavingHand 0.6s infinite steps(2); transform-origin: bottom right; }
    @keyframes wavingHand { 0% { transform: rotate(-10deg); } 100% { transform: rotate(10deg); } }

    .ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 18px; font-weight: bold; color: #5d4037; z-index: 100; background: rgba(255, 255, 255, 0.85); padding: 5px 15px; border-radius: 20px; white-space: nowrap; }

    .dog-container { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); width: 140%; pointer-events: none; z-index: 10; }
    #dog-img { width: 100%; height: auto; display: block; }

    .item { position: absolute; width: 100px; height: auto; cursor: pointer; z-index: 50; transition: transform 0.1s; }
    .item.selected { filter: drop-shadow(0 0 15px #ff5722) brightness(1.1); animation: shake 0.5s infinite; }
    @keyframes shake { 0%, 100% { transform: scale(1.1) rotate(0deg); } 25% { transform: scale(1.1) rotate(3deg); } 75% { transform: scale(1.1) rotate(-3deg); } }

    #result-screen { 
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        background-color: #000; 
        background-image: url('점수.png'); 
        background-size: 100% 100%; 
        background-repeat: no-repeat; 
        background-position: center; 
        display: none; 
        flex-direction: column; 
        justify-content: flex-start; 
        align-items: center; 
        z-index: 300; 
        color: white; 
        font-family: 'BMKkubulimTTF', sans-serif; 
        padding-top: 25vh; 
    }

    .result-text-area div { 
        text-shadow: none !important; 
        color: white !important; 
    }

    .btn-action { padding: 12px 35px; background: #ff4081; color: white; border-radius: 50px; border: none; font-size: 20px; font-family: 'BMKkubulimTTF', sans-serif; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 502; }
</style>
</head>
<body>

<div id="game">
    <div id="start-screen">
        <div id="particle-container"></div>
        <button id="start-btn" class="btn-action">게임 시작하기</button>
        <img id="waving-hand" src="손까딱.png" alt="✋">
    </div>

    <div class="ui">점수: <span id="score">0</span> / 100</div>
    <div class="dog-container">
        <img id="dog-img" src="뒷모습 강아지.png" alt="강아지">
    </div>
    <img id="chicken" class="item" src="치킨.png" alt="치킨" style="display: none;">
    <img id="sauce" class="item" src="갈릭 소스.png" alt="갈릭 소스" style="display: none;">

    <div id="ending-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; justify-content: center; align-items: center; z-index: 200;">
        <img id="full-ending-img" src="" alt="ending" style="width: 100%; height: 100%; object-fit: contain;">
    </div>
    
    <div id="result-screen">
        <div class="result-text-area">
            <div style="font-size: 28px; margin-bottom: 8px; line-height: 1.2;">손 쉴 틈 없이 먹은<br>치킨 조각</div>
            <div style="font-size: 52px;"><span id="last-score">0</span>개</div>
        </div>
        <button onclick="location.reload()" class="btn-action" style="margin-top: 20px;">다시 시작하기</button>
    </div>
</div>

<script>
    const sounds = {
        bgmPlay: new Audio('https://assets.mixkit.co/music/preview/mixkit-comical-stealth-703.mp3'),
        clickChicken: new Audio('치킨먹는소리.mp3'),
        clickSauce: new Audio('한입.mp3'),
        scoreResult: new Audio('https://www.soundjay.com/misc/sounds/magic-chime-01.mp3')
    };

    Object.values(sounds).forEach(audio => {
        audio.load();
        audio.volume = 0.2; 
    });
    sounds.bgmPlay.loop = true;

    let score = 0; let isLooking = false; let gameOver = true;
    const startScreen = document.getElementById("start-screen");

    document.getElementById("start-btn").addEventListener("click", function() {
        Object.values(sounds).forEach(audio => {
            let p = audio.play();
            if (p !== undefined) {
                p.then(() => {
                    if (audio !== sounds.bgmPlay) {
                        audio.pause();
                        audio.currentTime = 0;
                    }
                }).catch(() => {});
            }
        });
        
        sounds.bgmPlay.play();
        startScreen.style.display = "none"; 
        clearInterval(pInterval);
        gameOver = false; 
        relocateItems();
        randomTurn();
    });

    const particleContainer = document.getElementById("particle-container");
    function createParticles() {
        if (!gameOver) return;
        for(let i=0; i<60; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            const size = Math.random() * 8 + 3; 
            p.style.width = `${size}px`; p.style.height = `${size}px`;
            p.style.top = `${Math.random() * 100}%`; p.style.left = `${Math.random() * 100}%`;
            particleContainer.appendChild(p);
            setTimeout(() => { if(p.parentNode) p.remove(); }, 600);
        }
    }
    let pInterval = setInterval(createParticles, 600);

    const scoreEl = document.getElementById("score");
    const dogImg = document.getElementById("dog-img");
    const chicken = document.getElementById("chicken");
    const sauce = document.getElementById("sauce");
    const resultScreen = document.getElementById("result-screen");
    const lastScoreEl = document.getElementById("last-score");
    let state = "idle";

    // 📍 아이템 배치 시 겹침 방지 로직 추가
    function relocateItems() {
        if (gameOver) return;
        const rect = document.getElementById("game").getBoundingClientRect();
        
        // 치킨 위치 결정
        const cX = Math.random() * (rect.width - 110) + 5;
        const cY = Math.random() * (rect.height * 0.2) + (rect.height * 0.7);
        
        let sX, sY;
        let dist = 0;
        
        // 소스 위치 결정 (치킨과 최소 120px 이상 떨어질 때까지 반복)
        do {
            sX = Math.random() * (rect.width - 110) + 5;
            sY = Math.random() * (rect.height * 0.2) + (rect.height * 0.7);
            dist = Math.sqrt(Math.pow(cX - sX, 2) + Math.pow(cY - sY, 2));
        } while (dist < 120);

        chicken.style.left = `${cX}px`;
        chicken.style.top = `${cY}px`;
        sauce.style.left = `${sX}px`;
        sauce.style.top = `${sY}px`;
        
        chicken.style.display = "block"; 
        sauce.style.display = "block";
        chicken.classList.remove("selected");
        state = "idle";
    }

    function randomTurn() {
        if (gameOver) return;
        setTimeout(() => {
            if (gameOver) return;
            isLooking = true;
            dogImg.src = "뒤돌아 보는 강아지.png"; 
            setTimeout(() => {
                if (gameOver) return;
                isLooking = false;
                dogImg.src = "뒷모습 강아지.png"; 
                randomTurn();
            }, 800);
        }, Math.random() * 2000 + 1000);
    }

    function handleStart(e) {
        e.preventDefault();
        if (gameOver) return;
        if (isLooking) return endGame();

        const target = e.target;
        
        if (target === chicken && state === "idle") {
            sounds.clickChicken.currentTime = 0;
            sounds.clickChicken.play().catch(() => {});
            state = "picked";
            chicken.classList.add("selected");
        } 
        else if (target === sauce && state === "picked") {
            sounds.clickSauce.currentTime = 0;
            sounds.clickSauce.play().catch(() => {});
            score++;
            scoreEl.innerText = score;
            relocateItems();
        }
    }

    chicken.addEventListener("mousedown", handleStart);
    sauce.addEventListener("mousedown", handleStart);
    chicken.addEventListener("touchstart", handleStart, {passive: false});
    sauce.addEventListener("touchstart", handleStart, {passive: false});

    function endGame() {
        gameOver = true;
        sounds.bgmPlay.pause();
        // 엔딩 사운드 재생 코드 삭제됨
        document.getElementById("ending-overlay").style.display = "flex";
        document.getElementById("full-ending-img").src = "ending1.png"; 
        setTimeout(() => {
            document.getElementById("full-ending-img").src = "ending2.png"; 
            setTimeout(() => {
                document.getElementById("ending-overlay").style.display = "none";
                resultScreen.style.display = "flex";
                lastScoreEl.innerText = score;
                sounds.scoreResult.play().catch(() => {});
            }, 1200);
        }, 800);
    }
</script>
</body>
</html>
