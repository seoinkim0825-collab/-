<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>강아지 몰래 쏘이갈릭킹!</title>
<style>
    @font-face {
        font-family: 'BMKkubulimTTF';
        src: url('BMKkubulimTTF.ttf') format('truetype');
    }
    
    body { 
        margin: 0; 
        padding: 0;
        background: #000; 
        font-family: 'Arial', sans-serif; 
        text-align: center; 
        overflow: hidden; 
        touch-action: manipulation;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    
    #game { 
        position: relative; 
        width: 100vw; 
        height: 100vh; 
        max-width: 500px; 
        max-height: 100vh;
        overflow: hidden; 
        background-color: #000;
        background-image: url('배경2.png'); 
        background-size: contain; 
        background-repeat: no-repeat;
        background-position: center; 
    }

    /* 첫 화면 스타일 수정 (버튼 중앙 배치용) */
    #start-screen {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background-color: #000;
        background-image: url('첫 장면.png'); 
        background-size: contain; 
        background-repeat: no-repeat;
        background-position: center;
        z-index: 500; 
        display: flex; 
        justify-content: center; /* 세로 중앙 */
        align-items: center;     /* 가로 중앙 */
        flex-direction: column;
    }

    #particle-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 501; pointer-events: none; }
    .particle {
        position: absolute; border-radius: 50%; background: #ffffff; 
        box-shadow: 0 0 15px 5px rgba(255, 255, 255, 0.75);
        animation: twinkleFade 0.6s infinite steps(2);
        opacity: 0;
    }

    @keyframes twinkleFade { 0% { opacity: 0; transform: scale(0.4); } 100% { opacity: 1; transform: scale(1.1); } }

    /* 💖 손까딱: 안 잘리도록 오른쪽 여백 확보 */
    #waving-hand {
        position: absolute;
        bottom: 10%;      
        right: 5%;        /* ➡️ 오른쪽 끝에서 살짝 안으로 이동 */
        width: 70%; 
        height: auto;
        z-index: 505;      
        pointer-events: none;
        animation: wavingHand 0.6s infinite steps(2); 
        transform-origin: bottom right;
    }

    @keyframes wavingHand { 0% { transform: rotate(-12deg); } 100% { transform: rotate(12deg); } }

    .ui { 
        position: absolute; top: 20px; left: 50%; 
        transform: translateX(-50%);
        font-size: 18px; font-weight: bold; color: #5d4037; 
        z-index: 100; background: rgba(255, 255, 255, 0.85); 
        padding: 5px 15px; border-radius: 20px; white-space: nowrap;
    }

    /* 🐶 강아지 컨테이너: 크기 1.5배 확대 및 위치 조정 */
    .dog-container { 
        position: absolute; 
        top: 13%;          /* 위쪽 여백 살짝 조절 */
        left: 50%; 
        transform: translateX(-50%); 
        width: 100%;       /* 너비를 꽉 채워 크기 확대 */
        pointer-events: none; 
        z-index: 10; 
    }
    #dog-img { width: 100%; height: auto; display: block; }

    .item { 
        position: absolute; 
        width: 100px; 
        height: auto; 
        cursor: pointer; z-index: 50; 
    }
    
    #result-screen { 
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        background-color: #000;
        background-image: url('점수.png'); 
        background-size: contain; 
        background-repeat: no-repeat;
        background-position: center;
        display: none; flex-direction: column; 
        justify-content: center; align-items: center; 
        z-index: 300; color: white; font-family: 'BMKkubulimTTF', sans-serif; 
    }

    .btn-action { 
        padding: 12px 35px; background: #ff4081; color: white; 
        border-radius: 50px; border: none; font-size: 20px; 
        font-family: 'BMKkubulimTTF', sans-serif; font-weight: bold; 
        cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
        z-index: 502; 
    }
    /* 시작 버튼 마진 제거 (flex 중앙 배치 사용) */
    #start-btn { margin-top: 0; } 
</style>
</head>
<body>

<div id="game">
    <div id="start-screen">
        <div id="particle-container"></div>
        <button id="start-btn" class="btn-action">게임 시작하기</button>
        <img id="waving-hand" src="손까딱.png" alt="✋">
    </div>

    <div class="ui">점수: <span id="score">0</span> / 100</div>
    <div class="dog-container">
        <img id="dog-img" src="뒷모습 강아지.png" alt="강아지">
    </div>
    <img id="chicken" class="item" src="치킨.png" alt="치킨" style="display: none;">
    <img id="sauce" class="item" src="갈릭 소스.png" alt="갈릭 소스" style="display: none;">

    <div id="ending-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; justify-content: center; align-items: center; z-index: 200;">
        <img id="full-ending-img" src="" alt="ending" style="width: 100%; height: 100%; object-fit: contain;">
    </div>
    
    <div id="result-screen">
        <div style="font-size: 32px; text-shadow: 2px 2px 5px #000; margin-bottom: 10px;">손 쉴 틈 없이 먹은<br>치킨 조각</div>
        <div style="font-size: 50px; color: #ffcc00; text-shadow: 3px 3px 8px #000; margin-bottom: 30px;"><span id="last-score">0</span>개</div>
        <button onclick="location.reload()" class="btn-action">다시 도전하기</button>
    </div>
</div>

<script>
    let score = 0; let isLooking = false; let gameOver = true;
    const startScreen = document.getElementById("start-screen");
    const particleContainer = document.getElementById("particle-container");

    function createParticles() {
        if (!gameOver) return;
        for(let i=0; i<60; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            const size = Math.random() * 8 + 3; 
            p.style.width = `${size}px`; p.style.height = `${size}px`;
            p.style.top = `${Math.random() * 100}%`; p.style.left = `${Math.random() * 100}%`;
            particleContainer.appendChild(p);
            setTimeout(() => { if(p.parentNode) p.remove(); }, 600);
        }
    }

    let pInterval = setInterval(createParticles, 600);

    document.getElementById("start-btn").addEventListener("click", () => {
        startScreen.style.display = "none"; 
        clearInterval(pInterval);
        particleContainer.innerHTML = '';
        gameOver = false; 
        relocateItems();
        randomTurn();
    });

    const scoreEl = document.getElementById("score");
    const dogImg = document.getElementById("dog-img");
    const chicken = document.getElementById("chicken");
    const sauce = document.getElementById("sauce");
    const resultScreen = document.getElementById("result-screen");
    const lastScoreEl = document.getElementById("last-score");
    let state = "idle";

    function relocateItems() {
        if (gameOver) return;
        const rect = document.getElementById("game").getBoundingClientRect();
        const gameWidth = rect.width;
        const gameHeight = rect.height;
        
        // 아이템 배치 영역 조정 (강아지가 커진 만큼 하단 영역 활용)
        chicken.style.left = `${Math.random() * (gameWidth - 110) + 5}px`;
        chicken.style.top = `${Math.random() * (gameHeight * 0.25) + (gameHeight * 0.65)}px`;
        sauce.style.left = `${Math.random() * (gameWidth - 110) + 5}px`;
        sauce.style.top = `${Math.random() * (gameHeight * 0.25) + (gameHeight * 0.65)}px`;
        
        chicken.style.display = "block"; sauce.style.display = "block";
        chicken.classList.remove("selected");
        state = "idle";
    }

    function randomTurn() {
        if (gameOver) return;
        let waitTime = Math.random() * 2000 + 1000;
        setTimeout(() => {
            if (gameOver) return;
            isLooking = true;
            dogImg.src = "뒤돌아 보는 강아지.png"; 
            setTimeout(() => {
                if (gameOver) return;
                isLooking = false;
                dogImg.src = "뒷모습 강아지.png"; 
                randomTurn();
            }, 800);
        }, waitTime);
    }

    function handleStart(e) {
        e.preventDefault();
        const target = e.target;
        if (gameOver) return;
        if (isLooking) return endGame();

        if (target === chicken && state === "idle") {
            state = "picked";
            chicken.classList.add("selected");
        } else if (target === sauce && state === "picked") {
            score++;
            scoreEl.innerText = score;
            relocateItems();
        }
    }

    chicken.addEventListener("touchstart", handleStart);
    sauce.addEventListener("touchstart", handleStart);
    chicken.addEventListener("mousedown", handleStart);
    sauce.addEventListener("mousedown", handleStart);

    function endGame() {
        gameOver = true;
        const fullEndingImg = document.getElementById("full-ending-img");
        document.getElementById("ending-overlay").style.display = "flex";
        fullEndingImg.src = "ending1.png"; 
        setTimeout(() => {
            fullEndingImg.src = "ending2.png"; 
            setTimeout(() => {
                document.getElementById("ending-overlay").style.display = "none";
                resultScreen.style.display = "flex";
                lastScoreEl.innerText = score;
            }, 1200);
        }, 800);
    }
</script>
</body>
</html>
